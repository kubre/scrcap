name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Core tests
        run: swift run scrcap-core-tests
      - name: Release bundle
        run: SCRCAP_ALLOW_ADHOC=1 scripts/make_app.sh
      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: scrcap-macos
          path: |
            dist/scrcap-macos.zip
            dist/scrcap-macos.dmg
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/scrcap-macos.zip \
            dist/scrcap-macos.dmg \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
